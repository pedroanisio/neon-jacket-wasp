<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Silhouette v4 — Skeletal Deformation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;background:#0a0b0f;font-family:'JetBrains Mono',monospace;color:#c8ccd4}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');
#app{display:flex;width:100%;height:100%;position:relative}
canvas{display:block;flex:1;cursor:crosshair}
#panel{position:absolute;right:0;top:0;width:280px;height:100%;background:rgba(12,13,18,0.92);
  border-left:1px solid rgba(100,120,180,0.15);padding:16px;overflow-y:auto;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:rgba(100,120,180,0.3);border-radius:2px}
.section{margin-bottom:18px}
.section-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(100,140,255,0.6);margin-bottom:8px;font-weight:500}
.btn-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.btn{padding:5px 10px;font-size:10px;font-family:inherit;background:rgba(60,80,140,0.15);
  border:1px solid rgba(100,120,180,0.2);border-radius:3px;color:#8090b8;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(60,80,140,0.3);color:#b0c0e8}
.btn.active{background:rgba(70,110,220,0.25);border-color:rgba(100,140,255,0.5);color:#a0c0ff;
  box-shadow:0 0 8px rgba(80,120,255,0.15)}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.slider-label{font-size:9px;color:#6070a0;width:52px;flex-shrink:0;text-align:right}
.slider-val{font-size:9px;color:#5868a8;width:32px;text-align:right}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:rgba(60,80,140,0.3);
  border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;
  background:#4060c0;border-radius:50%;cursor:pointer;border:1px solid rgba(100,140,255,0.4)}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.toggle-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(100,120,180,0.4);transition:all .15s}
.toggle-dot.on{background:rgba(80,140,255,0.6);border-color:rgba(100,160,255,0.7);box-shadow:0 0 6px rgba(80,120,255,0.3)}
.toggle-label{font-size:10px;color:#7888b8}
.info{font-size:9px;color:#404860;line-height:1.5;margin-top:12px;padding-top:10px;
  border-top:1px solid rgba(100,120,180,0.1)}
.stat{display:flex;justify-content:space-between;margin-bottom:3px}
.stat-v{color:#5868a8}
#title-bar{position:absolute;left:16px;top:14px;pointer-events:none}
#title-bar h1{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(100,140,255,0.5);font-weight:400}
#title-bar p{font-size:9px;color:rgba(80,100,160,0.4);margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>
  <div id="title-bar">
    <h1>Silhouette v4 — Mesh Deformation</h1>
    <p>Triangulated Mesh · DQS · Forward Kinematics · Procedural Animation</p>
  </div>
  <div id="panel">
    <div class="section">
      <div class="section-title">Load Data</div>
      <div class="btn-row">
        <button class="btn" id="load-btn">Load JSON</button>
      </div>
      <input type="file" id="file-input" accept=".json" style="display:none">
      <div id="load-status" style="font-size:9px;color:#404860;margin-top:4px"></div>
    </div>
    <div class="section">
      <div class="section-title">Animation Preset</div>
      <div class="btn-row" id="presets"></div>
    </div>
    <div class="section">
      <div class="section-title">Bone Angles (deg)</div>
      <div id="bone-sliders"></div>
    </div>
    <div class="section">
      <div class="section-title">Display</div>
      <div id="toggles"></div>
    </div>
    <div class="section">
      <div class="section-title">Speed</div>
      <div class="slider-row">
        <span class="slider-label">rate</span>
        <input type="range" id="speed" min="0" max="200" value="100">
        <span class="slider-val" id="speed-val">1.0×</span>
      </div>
    </div>
    <div class="info" id="stats"></div>
  </div>
</div>
<script type="module" src="dist/index.js"></script>
</body>
</html>
