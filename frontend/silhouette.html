body,html{width:100%;height:100%;overflow:hidden;background:#0a0b0f;font-family:'JetBrains Mono',monospace;color:#c8ccd4}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

function parseContour(flat) {
  const pts = [];
  for (let i = 0; i < flat.length; i += 2) pts.push([flat[i], flat[i+1]]);
  return pts;
}

let LM = D.l; // landmark dict: name -> [dx, dy]

// ===================================================================
// BONE SYSTEM — Full bilateral skeleton with FK
// ===================================================================
// Hierarchy (14 bones):
//   root (waist) ─┬─ spine (shoulder) ─┬─ neck ── head

//                  │                    └─ l_arm ── l_forearm
//                  ├─ r_thigh ── r_shin ── r_foot
//                  └─ l_thigh ── l_shin ── l_foot

function buildBoneDefs(lm) {
  const sDx = lm.shoulder_peak[0], sDy = lm.shoulder_peak[1];
  const hDy = lm.hip_peak[1],      hJx = lm.hip_peak[0] * 0.35;
  const kDx = lm.knee_valley[0],   kDy = lm.knee_valley[1];
  const aDx = lm.ankle_valley[0],  aDy = lm.ankle_valley[1];
  const elbDy = (sDy + hDy) * 0.5, elbDx = sDx * 0.85;
  return [
    { name:'root',      jx: 0,     jy: lm.waist_valley[1], parent:-1 },
    { name:'spine',     jx: 0,     jy: sDy,                 parent: 0 },
    { name:'neck',      jx: 0,     jy: lm.neck_valley[1],   parent: 1 },
    { name:'head',      jx: 0,     jy: lm.crown[1],         parent: 2 },

    { name:'l_arm',     jx:-sDx,   jy: sDy,                 parent: 1 },

// --- Matrix utilities ---
function matMul(A, B) {
  return [
    A[0]*B[0]+A[1]*B[3], A[0]*B[1]+A[1]*B[4], A[0]*B[2]+A[1]*B[5]+A[2],
    A[3]*B[0]+A[4]*B[3], A[3]*B[1]+A[4]*B[4], A[3]*B[2]+A[4]*B[5]+A[5],
  ];
}
function matRot(a) { const c=Math.cos(a),s=Math.sin(a); return [c,-s,0, s,c,0]; }
function matTrans(tx,ty) { return [1,0,tx, 0,1,ty]; }
function matRotAround(cx,cy,a) {
  return matMul(matTrans(cx,cy), matMul(matRot(a), matTrans(-cx,-cy)));
}
function matXform(m,x,y) { return [m[0]*x+m[1]*y+m[2], m[3]*x+m[4]*y+m[5]]; }

// --- Forward kinematics (2D joints) ---
function updateBones() {
  for (let i = 0; i < bones.length; i++) {
    const b = bones[i];
    if (b.parent < 0) {
      b.wm = matRotAround(b.jx, b.jy, b.angle);
      b.wj = matXform(b.wm, b.jx, b.jy);
    } else {
      const p = bones[b.parent];
      b.wj = matXform(p.wm, b.jx, b.jy);
      b.wm = matMul(matRotAround(b.wj[0], b.wj[1], b.angle), p.wm);
    }
  }
}

function ss(t) { return t * t * (3 - 2 * t); }

  const side = dx >= 0 ? 'r' : 'l';

    const t = (dy - neckDy) / (shoulderDy - neckDy);
    if (t > 0.7) { const s = ss((t-0.7)/0.3); return [[BI.neck, 1-s], [BI.spine, s]]; }
    return [[BI.neck, 1.0]];
  }

    const elbowDy = (shoulderDy + hipDy) * 0.5;
    // Arm region (outer)

      if (dy <= elbowDy) {
        const ab = side === 'r' ? BI.r_arm : BI.l_arm;
        const d = dy - shoulderDy;
        if (d < BLEND_HU) return [[BI.spine, 1-ss(d/BLEND_HU)], [ab, ss(d/BLEND_HU)]];
        return [[ab, 1.0]];
      }
      return [[side === 'r' ? BI.r_forearm : BI.l_forearm, 1.0]];
    }
    // Torso
    if (dy <= waistDy) return [[BI.spine, 1.0]];
    const hd = hipDy - dy;
    if (hd < BLEND_HU) {
      const tb = side === 'r' ? BI.r_thigh : BI.l_thigh;
      return [[BI.root, 1-ss(1-hd/BLEND_HU)], [tb, ss(1-hd/BLEND_HU)]];
    }
    return [[BI.root, 1.0]];
  }

  const sh = side === 'r' ? BI.r_shin  : BI.l_shin;
  const ft = side === 'r' ? BI.r_foot  : BI.l_foot;
  if (dy <= kneeDy) {
    const kd = kneeDy - dy;
    if (kd < BLEND_HU) return [[th, 1-ss(1-kd/BLEND_HU)], [sh, ss(1-kd/BLEND_HU)]];
    return [[th, 1.0]];

  if (dy <= ankleDy) {
    const ad = ankleDy - dy;
    if (ad < BLEND_HU) return [[sh, 1-ss(1-ad/BLEND_HU)], [ft, ss(1-ad/BLEND_HU)]];
    return [[sh, 1.0]];
  }
  return [[ft, 1.0]];
}

let vertexWeights = contour.map(p => getWeights(p[0], p[1]));

// ===================================================================
// DEFORMATION — Linear Blend Skinning
// ===================================================================
function deformPoint(px, py, weights) {
  let rx = 0, ry = 0;
  for (const [bi, w] of weights) {
    const [tx, ty] = matXform(bones[bi].wm, px, py);
    rx += w * tx;
    ry += w * ty;
  }
  return [rx, ry];
}

function deformContour() {
  return contour.map((p, i) => deformPoint(p[0], p[1], vertexWeights[i]));
}

// ===================================================================
// ANIMATION PRESETS
// ===================================================================
const PI = Math.PI;
const Z = { root:0, spine:0, neck:0, head:0,
  r_arm:0, r_forearm:0, l_arm:0, l_forearm:0,
  r_thigh:0, r_shin:0, r_foot:0, l_thigh:0, l_shin:0, l_foot:0 };

const PRESETS = {
  idle: (t) => {
    const b = Math.sin(t*1.8)*0.008;
    return { ...Z, spine:b, neck:b*0.7, head:Math.sin(t*2.4)*0.006,
      r_arm:Math.sin(t*1.2)*0.01, l_arm:Math.sin(t*1.2+0.5)*0.01 };
  },
  breathe: (t) => {
    const p = Math.sin(t);
    return { ...Z, root:p*0.005, spine:p*0.018, neck:p*0.012, head:Math.sin(t*1.5)*0.008,
      r_arm:p*0.015, l_arm:p*0.015, r_forearm:p*0.008, l_forearm:p*0.008 };
  },
  walk: (t) => {
    const s=Math.sin(t*2.5), pos=Math.max(0,s), neg=Math.max(0,-s);
    return { ...Z, root:Math.sin(t*5)*0.008, spine:Math.cos(t*2.5)*0.012,
      neck:Math.cos(t*2.5)*0.008, head:s*0.005,
      r_arm:s*0.18, r_forearm:pos*0.12, l_arm:-s*0.18, l_forearm:neg*0.12,
      r_thigh:-s*0.2, r_shin:neg*0.18, l_thigh:s*0.2, l_shin:pos*0.18 };
  },
  contrapposto: (t) => {
    const s=Math.sin(t*0.5), a=Math.abs(s), d=s>0?1:-1;
    return { ...Z, root:d*a*0.04, spine:d*a*-0.035, neck:d*a*-0.02, head:d*a*0.015,
      r_arm:d*a*0.05, l_arm:d*a*-0.05, r_forearm:d*a*0.03, l_forearm:d*a*-0.03,
      r_thigh:d*a*-0.025, l_thigh:d*a*0.025, r_shin:d*a*0.01, l_shin:d*a*-0.01 };
  },
  wave: (t) => {
    const w=Math.sin(t*3)*0.3;
    return { ...Z, spine:0.01, neck:0.005,
      r_arm:-0.6+w*0.15, r_forearm:-0.8+w, l_arm:0.05, l_forearm:0.02 };
  },
  squat: (t) => {
    const p=(Math.sin(t*0.6)+1)/2, e=p*p*(3-2*p);
    return { ...Z, root:e*0.04, spine:e*-0.03, neck:e*-0.02,
      r_arm:e*0.15, l_arm:e*0.15, r_forearm:e*0.2, l_forearm:e*0.2,
      r_thigh:e*0.25, r_shin:e*-0.45, r_foot:e*0.2,
      l_thigh:e*0.25, l_shin:e*-0.45, l_foot:e*0.2 };
  },
  march: (t) => {
    const s=Math.sin(t*2.5), pos=Math.max(0,s), neg=Math.max(0,-s);
    return { ...Z, root:Math.sin(t*5)*0.01, spine:Math.cos(t*2.5)*0.015,
      neck:Math.cos(t*2.5)*0.01, head:s*0.005,
      r_arm:s*0.25, r_forearm:pos*0.2, l_arm:-s*0.25, l_forearm:neg*0.2,
      r_thigh:-s*0.35, r_shin:neg*0.3, l_thigh:s*0.35, l_shin:pos*0.3 };
  },
};

let activePreset = 'idle';
let manualOverrides = {};

// ===================================================================
// CANVAS & RENDERING
// ===================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, scale, ox, oy;
function resize() {
  const panelW = 280;
  W = canvas.width = window.innerWidth - panelW;
  H = canvas.height = window.innerHeight;
  // Scale: figure is ~8 HU tall, ~2.6 HU wide (mirrored)
  const figH = 8.2, figW = 2.8;
  scale = Math.min(H * 0.88 / figH, W * 0.85 / figW);
  ox = W / 2;        // center X (midline at dx=0)
  oy = H * 0.06;     // top margin
}
window.addEventListener('resize', resize);
resize();

function toScreen(dx, dy) {
  return [ox + dx * scale, oy + dy * scale];
}

// Display toggles
const display = {
  fill: true, outline: true, skeleton: true,
  joints: true, labels: false, com: true, grid: false,
};

function drawGrid() {
  ctx.strokeStyle = 'rgba(40,55,100,0.12)';
  ctx.lineWidth = 0.5;
  for (let hu = 0; hu <= 8; hu++) {
    const [, sy] = toScreen(0, hu);
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  }
  for (let dx = -1.5; dx <= 1.5; dx += 0.5) {
    const [sx] = toScreen(dx, 0);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
  }
  // HU labels
  ctx.fillStyle = 'rgba(60,80,140,0.25)';
  ctx.font = '9px JetBrains Mono';
  for (let hu = 0; hu <= 8; hu++) {
    const [sx, sy] = toScreen(-1.5, hu);
    ctx.fillText(hu + ' HU', sx - 30, sy + 3);
  }
}

function drawFill(pts) {
  // Gradient fill
  const [,y0] = toScreen(0, 0);
  const [,y1] = toScreen(0, 8);
  const grad = ctx.createLinearGradient(ox, y0, ox, y1);
  grad.addColorStop(0, 'rgba(35,45,80,0.85)');
  grad.addColorStop(0.3, 'rgba(30,40,70,0.9)');
  grad.addColorStop(0.7, 'rgba(25,35,65,0.88)');
  grad.addColorStop(1, 'rgba(20,30,55,0.85)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  const [sx0, sy0] = toScreen(pts[0][0], pts[0][1]);
  ctx.moveTo(sx0, sy0);
  for (let i = 1; i < pts.length; i++) {
    const [sx, sy] = toScreen(pts[i][0], pts[i][1]);
    ctx.lineTo(sx, sy);
  }
  ctx.closePath();

  // NOTE: Interior hole sub-paths (leg gap) are NOT rendered here because
  // the hole coordinates are in static HU space and cannot follow bone
  // deformation.  The evenodd fill rule handles the arm-gap re-entrant
  // correctly.  Rendering separated legs requires the extraction pipeline
  // to emit separate leg contour paths that can be bone-deformed.
  ctx.fill("evenodd");
}

function drawOutline(pts) {
  ctx.strokeStyle = 'rgba(90,130,255,0.5)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  const [sx0, sy0] = toScreen(pts[0][0], pts[0][1]);
  ctx.moveTo(sx0, sy0);
  for (let i = 1; i < pts.length; i++) {
    const [sx, sy] = toScreen(pts[i][0], pts[i][1]);
    ctx.lineTo(sx, sy);
  }
  ctx.closePath();
  ctx.stroke();

  // Glow pass
  ctx.strokeStyle = 'rgba(80,120,255,0.12)';
  ctx.lineWidth = 4;
  ctx.stroke();
}

function drawSkeleton() {
  // Draw bone segments
  ctx.lineWidth = 2;
  for (let i = 0; i < bones.length; i++) {
    const b = bones[i];
    if (b.parent < 0) continue;
    const p = bones[b.parent];
    const [sx1, sy1] = toScreen(p.wj[0], p.wj[1]);
    const [sx2, sy2] = toScreen(b.wj[0], b.wj[1]);

    ctx.strokeStyle = 'rgba(255,180,60,0.45)';
    ctx.beginPath();
    ctx.moveTo(sx1, sy1);
    ctx.lineTo(sx2, sy2);
    ctx.stroke();

    // Glow
    ctx.strokeStyle = 'rgba(255,160,40,0.1)';
    ctx.lineWidth = 6;
    ctx.stroke();
    ctx.lineWidth = 2;
  }
}

function drawJoints() {
  for (let i = 0; i < bones.length; i++) {
    const b = bones[i];
    const [sx, sy] = toScreen(b.wj[0], b.wj[1]);
    const r = i === 0 ? 5 : 3.5;

    // Joint circle
    ctx.fillStyle = i === 0
      ? 'rgba(255,100,80,0.7)'
      : 'rgba(255,200,80,0.6)';
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, PI * 2);
    ctx.fill();

    // Glow
    ctx.fillStyle = i === 0
      ? 'rgba(255,80,60,0.15)'
      : 'rgba(255,180,60,0.1)';
    ctx.beginPath();
    ctx.arc(sx, sy, r * 2.5, 0, PI * 2);
    ctx.fill();

    if (display.labels) {
      ctx.fillStyle = 'rgba(200,180,140,0.5)';
      ctx.font = '8px JetBrains Mono';
      ctx.fillText(b.name, sx + 8, sy - 4);
    }
  }
}

function drawCoM() {
  // Whole-body CoM
  const comDy = 3.7199;
  const [comSx, comSy] = toScreen(0, comDy);
  const dcom = deformPoint(0, comDy, getWeights(0, comDy));
  const [dcsx, dcsy] = toScreen(dcom[0], dcom[1]);

  ctx.strokeStyle = 'rgba(100,255,150,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dcsx - 6, dcsy); ctx.lineTo(dcsx + 6, dcsy);
  ctx.moveTo(dcsx, dcsy - 6); ctx.lineTo(dcsx, dcsy + 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(dcsx, dcsy, 4, 0, PI * 2);
  ctx.stroke();
}

// ===================================================================
// ANIMATION LOOP
// ===================================================================
let animTime = 0;
let lastTs = 0;
let speed = 1.0;
let playing = true;

function applyPreset(t) {
  const fn = PRESETS[activePreset];
  if (!fn) return;
  const angles = fn(t);
  for (const b of bones) {
    if (manualOverrides[b.name] !== undefined) {
      b.angle = manualOverrides[b.name];
    } else {
      b.angle = angles[b.name] || 0;
    }
  }
}

function render(ts) {
  if (!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;

  if (playing) animTime += dt * speed;

  // Apply animation
  applyPreset(animTime);

  // Forward kinematics
  updateBones();

  // Deform contour
  const deformed = deformContour();

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Grid
  if (display.grid) drawGrid();

  // Fill
  if (display.fill) drawFill(deformed);

  // Outline
  if (display.outline) drawOutline(deformed);

  // Skeleton
  if (display.skeleton) drawSkeleton();

  // Joints
  if (display.joints) drawJoints();

  // CoM
  if (display.com) drawCoM();

  // Stats
  updateStats();

  requestAnimationFrame(render);
}

function updateStats() {
  const el = document.getElementById('stats');
  const angleStrs = bones.map(b =>
    `<div class="stat"><span>${b.name}</span><span class="stat-v">${(b.angle * 180 / PI).toFixed(1)}°</span></div>`
  ).join('');
  el.innerHTML = `
    <div class="stat"><span>vertices</span><span class="stat-v">${contour.length}</span></div>
    <div class="stat"><span>bones</span><span class="stat-v">${bones.length}</span></div>
    <div class="stat"><span>preset</span><span class="stat-v">${activePreset}</span></div>
    <div class="stat"><span>time</span><span class="stat-v">${animTime.toFixed(1)}s</span></div>
    <div style="margin-top:6px;border-top:1px solid rgba(100,120,180,0.08);padding-top:6px">
    ${angleStrs}</div>
  `;
}

// ===================================================================
// UI CONTROLS
// ===================================================================
// Preset buttons
const presetsEl = document.getElementById('presets');
Object.keys(PRESETS).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'btn' + (name === activePreset ? ' active' : '');
  btn.textContent = name;
  btn.onclick = () => {
    activePreset = name;
    manualOverrides = {};
    presetsEl.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Reset sliders
    document.querySelectorAll('.bone-slider').forEach(sl => sl.value = 0);
  };
  presetsEl.appendChild(btn);
});

// Bone sliders
const slidersEl = document.getElementById('bone-sliders');
bones.forEach((b, i) => {
  const row = document.createElement('div');
  row.className = 'slider-row';
  const lbl = document.createElement('span');
  lbl.className = 'slider-label';
  lbl.textContent = b.name;
  const sl = document.createElement('input');
  sl.type = 'range';
  sl.className = 'bone-slider';
  sl.min = -90; sl.max = 90; sl.value = 0; sl.step = 0.5;
  sl.dataset.bone = b.name;
  const val = document.createElement('span');
  val.className = 'slider-val';
  val.textContent = '0°';
  sl.oninput = () => {
    const deg = parseFloat(sl.value);
    val.textContent = deg.toFixed(1) + '°';
    if (Math.abs(deg) < 0.3) {
      delete manualOverrides[b.name];
    } else {
      manualOverrides[b.name] = deg * PI / 180;
    }
  };
  row.appendChild(lbl);
  row.appendChild(sl);
  row.appendChild(val);
  slidersEl.appendChild(row);
});

// Display toggles
const togglesEl = document.getElementById('toggles');
Object.keys(display).forEach(key => {
  const row = document.createElement('div');
  row.className = 'toggle-row';
  const dot = document.createElement('div');
  dot.className = 'toggle-dot' + (display[key] ? ' on' : '');
  const lbl = document.createElement('span');
  lbl.className = 'toggle-label';
  lbl.textContent = key;
  row.onclick = () => {
    display[key] = !display[key];
    dot.classList.toggle('on');
  };
  row.appendChild(dot);
  row.appendChild(lbl);
  togglesEl.appendChild(row);
});

// Speed slider
const speedSlider = document.getElementById('speed');
const speedVal = document.getElementById('speed-val');
speedSlider.oninput = () => {
  speed = parseFloat(speedSlider.value) / 100;
  speedVal.textContent = speed.toFixed(1) + '×';
};

// ===================================================================
// FILE LOADING
// ===================================================================
function loadJsonData(json) {
  let newContourFlat, newLM;

  // v4 schema format: contour = [[dx,dy],...], landmarks = [{name,dx,dy},...]
  if (Array.isArray(json.contour) && Array.isArray(json.landmarks)) {
    // When mirror.applied is true, the contour stores the right-side
    // outline + a midline return path.  We need to build the full
    // bilateral polygon by mirroring the right half.
    const pts = json.contour;
    const mirrored = json.meta && json.meta.mirror && json.meta.mirror.applied;

    if (mirrored) {
      // Right half: index 0 to max-dy point (crown → sole)
      let splitIdx = 0;
      for (let i = 1; i < pts.length; i++) {
        if (pts[i][1] > pts[splitIdx][1]) splitIdx = i;
      }
      const rightHalf = pts.slice(0, splitIdx + 1);
      // Left half: mirror the right half (negate dx), reversed (sole → crown)
      const leftHalf = rightHalf.slice().reverse().map(p => [-p[0], p[1]]);
      // Build flat array: right + left = closed bilateral polygon
      const full = [];
      for (const p of rightHalf) { full.push(p[0], p[1]); }
      for (const p of leftHalf) { full.push(p[0], p[1]); }
      newContourFlat = full;
    } else {
      // Full 360° contour — use as-is
      newContourFlat = pts.flat();
    }

    newLM = {};
    for (const lm of json.landmarks) {
      newLM[lm.name] = [lm.dx, lm.dy];
    }
  }
  // Compact format: c = flat array, l = dict
  else if (json.c && json.l) {
    newContourFlat = json.c;
    newLM = json.l;
  }
  else {
    throw new Error("Unrecognized format: needs 'contour'+'landmarks' or 'c'+'l'");
  }

  // Validate required landmarks for the bone system
  const required = ['crown','neck_valley','shoulder_peak','waist_valley',
                    'hip_peak','knee_valley','ankle_valley','sole'];
  for (const name of required) {
    if (!newLM[name]) throw new Error('Missing required landmark: ' + name);
  }

  // Extract interior hole polygons from multi-span scanline data
  window._holePolygons = [];
  if (json.measurements && json.measurements.scanlines) {
    const scanlines = json.measurements.scanlines;
    const multiSpanLevels = [];
    for (const [dk, entry] of Object.entries(scanlines)) {
      let spans = null;
      if (entry && typeof entry === 'object' && !Array.isArray(entry) && entry.topology_detail) {
        spans = entry.topology_detail;
      } else if (Array.isArray(entry) && entry.length >= 2) {
        spans = entry;
      }
      // Only use levels with exactly 2 spans below the hip (dy > 4.0),
      // where the right span is on the positive side and left span is on
      // the negative side.  Levels above the hip with 2 spans are torso/
      // helmet detail crossings, not leg separation.
      const dy = parseFloat(dk);
      if (spans && spans.length === 2 && dy > 4.0 &&
          spans[0].inner_dx > 0 && spans[1].outer_dx < 0) {
        multiSpanLevels.push({
          dy: parseFloat(dk),
          gapLeft: spans[1].outer_dx,
          gapRight: spans[0].inner_dx,
        });
      }
    }
    multiSpanLevels.sort((a, b) => a.dy - b.dy);
    if (multiSpanLevels.length >= 2) {
      let group = [multiSpanLevels[0]];
      for (let i = 1; i < multiSpanLevels.length; i++) {
        if (multiSpanLevels[i].dy - multiSpanLevels[i - 1].dy <= 0.25) {
          group.push(multiSpanLevels[i]);
        } else {
          if (group.length >= 2) window._holePolygons.push(group);
          group = [multiSpanLevels[i]];
        }
      }
      if (group.length >= 2) window._holePolygons.push(group);
    }
  }

  // Update globals
  contour = parseContour(newContourFlat);
  LM = newLM;

  // Rebuild bilateral bone system from landmarks
  BONE_DEFS = buildBoneDefs(LM);
  bones = BONE_DEFS.map(d => ({
    ...d, angle: 0, wm: [1,0,0, 0,1,0], wj: [d.jx, d.jy],
  }));
  BI = {};
  bones.forEach((b,i) => BI[b.name] = i);
  armThresholdDx = LM.waist_valley ? LM.waist_valley[0] * 1.05 : 0.58;
  vertexWeights = contour.map(p => getWeights(p[0], p[1]));

  // Reset animation state
  manualOverrides = {};
  animTime = 0;

  // Rebuild bone sliders
  slidersEl.innerHTML = '';
  bones.forEach((b) => {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const lbl = document.createElement('span');
    lbl.className = 'slider-label';
    lbl.textContent = b.name;
    const sl = document.createElement('input');
    sl.type = 'range'; sl.className = 'bone-slider';
    sl.min = -90; sl.max = 90; sl.value = 0; sl.step = 0.5;
    sl.dataset.bone = b.name;
    const val = document.createElement('span');
    val.className = 'slider-val';
    val.textContent = '0°';
    sl.oninput = () => {
      const deg = parseFloat(sl.value);
      val.textContent = deg.toFixed(1) + '°';
      if (Math.abs(deg) < 0.3) { delete manualOverrides[b.name]; }
      else { manualOverrides[b.name] = deg * PI / 180; }
    };
    row.appendChild(lbl); row.appendChild(sl); row.appendChild(val);
    slidersEl.appendChild(row);
  });
}

const fileInput = document.getElementById('file-input');
const loadBtn = document.getElementById('load-btn');
const loadStatus = document.getElementById('load-status');

loadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadStatus.style.color = '#404860';
  loadStatus.textContent = 'Loading…';
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const json = JSON.parse(ev.target.result);
      loadJsonData(json);
      loadStatus.style.color = 'rgba(100,255,150,0.6)';
      loadStatus.textContent = file.name + ' — ' + contour.length + ' pts';
    } catch (err) {
      loadStatus.style.color = '#ef4444';
      loadStatus.textContent = err.message;
    }
  };
  reader.onerror = () => {
    loadStatus.style.color = '#ef4444';
    loadStatus.textContent = 'Failed to read file.';
  };
  reader.readAsText(file);
  fileInput.value = '';
};

// Start
requestAnimationFrame(render);
</script>
