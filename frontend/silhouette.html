// ===================================================================
// PARSE
// ===================================================================
function parseContour(flat) {
  const pts = [];
  for (let i = 0; i < flat.length; i += 2) pts.push([flat[i], flat[i+1]]);
  return pts;
}
let contour = parseContour(D.c);
let LM = D.l; // landmark dict: name -> [dx, dy]

// ===================================================================
// BONE SYSTEM — Forward Kinematics with 2D affine matrices
// ===================================================================
// Bone hierarchy:
//   root (waist) ─┬─ spine (shoulder) ── neck ── head (crown)
//                  └─ pelvis (hip) ── thigh (knee) ── shank (ankle) ── foot (sole)

let BONE_DEFS = [
  { name: 'root',    jy: LM.waist_valley[1],    parent: -1 },   // 0
  { name: 'spine',   jy: LM.shoulder_peak[1],    parent: 0  },   // 1
  { name: 'neck',    jy: LM.neck_valley[1],      parent: 1  },   // 2
  { name: 'head',    jy: LM.crown[1],            parent: 2  },   // 3
  { name: 'pelvis',  jy: LM.hip_peak[1],         parent: 0  },   // 4
  { name: 'thigh',   jy: LM.knee_valley[1],      parent: 4  },   // 5
  { name: 'shank',   jy: LM.ankle_valley[1],     parent: 5  },   // 6
  { name: 'foot',    jy: LM.sole[1],             parent: 6  },   // 7
];

// Bone runtime state
let bones = BONE_DEFS.map(d => ({
  ...d,
  angle: 0,
  // World matrix [a, b, tx, c, d, ty] for 2D affine
  wm: [1,0,0, 0,1,0],
  // World-space joint position
  wj: [0, d.jy],
}));

// Index lookup
let BI = {};
bones.forEach((b,i) => BI[b.name] = i);

// --- Matrix utilities ---
function matIdent() { return [1,0,0, 0,1,0]; }
function matMul(A, B) {
  return [
    A[0]*B[0]+A[1]*B[3], A[0]*B[1]+A[1]*B[4], A[0]*B[2]+A[1]*B[5]+A[2],
    A[3]*B[0]+A[4]*B[3], A[3]*B[1]+A[4]*B[4], A[3]*B[2]+A[4]*B[5]+A[5],
  ];
}
function matRot(a) { const c=Math.cos(a),s=Math.sin(a); return [c,-s,0, s,c,0]; }
function matTrans(tx,ty) { return [1,0,tx, 0,1,ty]; }
function matRotAround(cx,cy,a) {
  return matMul(matTrans(cx,cy), matMul(matRot(a), matTrans(-cx,-cy)));
}
function matXform(m,x,y) { return [m[0]*x+m[1]*y+m[2], m[3]*x+m[4]*y+m[5]]; }

// --- Forward kinematics ---
function updateBones() {
  for (let i = 0; i < bones.length; i++) {
    const b = bones[i];
    if (b.parent < 0) {
      b.wm = matRotAround(0, b.jy, b.angle);
      b.wj = matXform(b.wm, 0, b.jy);
    } else {
      const p = bones[b.parent];
      // Transform rest joint through parent's world matrix
      b.wj = matXform(p.wm, 0, b.jy);
      // Local rotation around the world-space joint
      const localRot = matRotAround(b.wj[0], b.wj[1], b.angle);
      b.wm = matMul(localRot, p.wm);
    }
  }
}

// ===================================================================
// SKINNING — assign each vertex to a bone chain based on dy
// ===================================================================
// For a point at dy, return the index of the deepest influencing bone.
// Upper body: root(2.70) → spine(2.29) → neck(1.26) → head(0.005)
// Lower body: root(2.70) → pelvis(3.96) → thigh(5.28) → shank(7.38) → foot(8.0)

function getBoneIdx(dy) {
  if (dy <= LM.crown[1] + 0.01) return BI.head;
  if (dy <= LM.neck_valley[1])  return BI.head;
  if (dy <= LM.shoulder_peak[1]) return BI.neck;
  if (dy <= LM.waist_valley[1]) return BI.spine;
  if (dy <= LM.hip_peak[1])    return BI.root;
  if (dy <= LM.knee_valley[1]) return BI.pelvis;
  if (dy <= LM.ankle_valley[1]) return BI.thigh;
  return BI.shank;
}

// Smooth blending: for each vertex, compute 1-2 bone weights
const BLEND_HU = 0.35;
function getWeights(dy) {
  // Joint boundaries ordered by dy
  const joints = [
    [LM.crown[1],         BI.head],
    [LM.neck_valley[1],   BI.neck],
    [LM.shoulder_peak[1], BI.spine],
    [LM.waist_valley[1],  BI.root],
    [LM.hip_peak[1],      BI.pelvis],
    [LM.knee_valley[1],   BI.thigh],
    [LM.ankle_valley[1],  BI.shank],
    [LM.sole[1],          BI.foot],
  ];

  // Find which zone the point is in
  for (let i = 0; i < joints.length - 1; i++) {
    const [jy0, bi0] = joints[i];
    const [jy1, bi1] = joints[i + 1];
    if (dy >= jy0 && dy <= jy1) {
      const dist_to_lower = jy1 - dy;
      const dist_to_upper = dy - jy0;

      // Pure zone — no blending needed
      if (dist_to_lower > BLEND_HU && dist_to_upper > BLEND_HU) {
        return [[bi0, 1.0]];
      }
      // Near lower boundary — blend with next zone's bone
      if (dist_to_lower <= BLEND_HU && i + 1 < joints.length - 1) {
        const t = dist_to_lower / BLEND_HU;
        const smooth = t * t * (3 - 2 * t); // smoothstep
        return [[bi0, smooth], [bi1, 1 - smooth]];
      }
      // Near upper boundary — blend with this zone's bone
      if (dist_to_upper <= BLEND_HU && i > 0) {
        const t = dist_to_upper / BLEND_HU;
        const smooth = t * t * (3 - 2 * t);
        const [_, biPrev] = joints[i - 1];
        return [[bi0, smooth], [biPrev, 1 - smooth]];
      }
      return [[bi0, 1.0]];
    }
  }
  return [[BI.root, 1.0]];
}

// Pre-compute weights for all contour vertices
let vertexWeights = contour.map(p => getWeights(p[1]));

// ===================================================================
// DEFORMATION — Linear Blend Skinning
// ===================================================================
function deformPoint(px, py, weights) {
  let rx = 0, ry = 0;
  for (const [bi, w] of weights) {
    const [tx, ty] = matXform(bones[bi].wm, px, py);
    rx += w * tx;
    ry += w * ty;
  }
  return [rx, ry];
}

function deformContour() {
  return contour.map((p, i) => deformPoint(p[0], p[1], vertexWeights[i]));
}

      root: phase * 0.005, spine: phase * 0.018,
      neck: phase * 0.012, head: Math.sin(t * 1.5) * 0.008,
      pelvis: phase * -0.003, thigh: 0, shank: 0, foot: 0
    };
  },
  sway: (t) => ({
    root:   Math.sin(t * 0.7) * 0.045,
    spine:  Math.sin(t * 0.7 + 0.4) * -0.025,
    neck:   Math.sin(t * 0.7 + 0.7) * -0.018,
    head:   Math.sin(t * 1.1) * 0.012,
    pelvis: Math.sin(t * 0.7) * -0.02,
    thigh:  Math.sin(t * 0.7 + 0.3) * 0.01,
    shank: 0, foot: 0
  }),
  contrapposto: (t) => {
    const s = Math.sin(t * 0.5);
    const side = s > 0 ? 1 : -1;
    const ease = Math.abs(s);
    return {
      root:   side * ease * 0.04,
      spine:  side * ease * -0.035,
      neck:   side * ease * -0.02,
      head:   side * ease * 0.015,
      pelvis: side * ease * -0.025,
      thigh:  side * ease * 0.015,
      shank:  side * ease * -0.008,
      foot: 0
    };
  },
  squat: (t) => {
    const phase = (Math.sin(t * 0.6) + 1) / 2;
    const e = phase * phase * (3 - 2 * phase);
    return {
      root:   e * 0.04,  spine: e * -0.03,
      neck:   e * -0.02, head:  0,
      pelvis: e * 0.06,  thigh: e * -0.12,
      shank:  e * 0.1,   foot:  e * -0.02
    };
  },
  march: (t) => {
    const s = Math.sin(t * 2.5);
    const c = Math.cos(t * 2.5);
    return {
      root:  Math.sin(t * 5) * 0.008,
      spine: c * 0.015, neck: c * 0.01,
      head:  s * 0.005,
      pelvis: s * 0.03, thigh: s * -0.08,
      shank:  (s > 0 ? s : 0) * 0.06,
      foot: 0
    };
  },
};

let activePreset = 'idle';
let manualOverrides = {};

// ===================================================================
// CANVAS & RENDERING
// ===================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, scale, ox, oy;
function resize() {
  const panelW = 260;
  W = canvas.width = window.innerWidth - panelW;
  H = canvas.height = window.innerHeight;
  // Scale: figure is ~8 HU tall, ~2.6 HU wide (mirrored)
  const figH = 8.2, figW = 2.8;
  scale = Math.min(H * 0.88 / figH, W * 0.85 / figW);
  ox = W / 2;        // center X (midline at dx=0)
  oy = H * 0.06;     // top margin
}
window.addEventListener('resize', resize);
resize();

function toScreen(dx, dy) {
  return [ox + dx * scale, oy + dy * scale];
}

// Display toggles
const display = {
  fill: true, outline: true, skeleton: true,
  joints: true, labels: false, com: true, grid: false,
};

function drawGrid() {
  ctx.strokeStyle = 'rgba(40,55,100,0.12)';
  ctx.lineWidth = 0.5;
  for (let hu = 0; hu <= 8; hu++) {
    const [, sy] = toScreen(0, hu);
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  }
  for (let dx = -1.5; dx <= 1.5; dx += 0.5) {
    const [sx] = toScreen(dx, 0);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
  }
  // HU labels
  ctx.fillStyle = 'rgba(60,80,140,0.25)';
  ctx.font = '9px JetBrains Mono';
  for (let hu = 0; hu <= 8; hu++) {
    const [sx, sy] = toScreen(-1.5, hu);
    ctx.fillText(hu + ' HU', sx - 30, sy + 3);
  }
}

function drawFill(pts) {
  // Gradient fill
  const [,y0] = toScreen(0, 0);
  const [,y1] = toScreen(0, 8);
  const grad = ctx.createLinearGradient(ox, y0, ox, y1);
  grad.addColorStop(0, 'rgba(35,45,80,0.85)');
  grad.addColorStop(0.3, 'rgba(30,40,70,0.9)');
  grad.addColorStop(0.7, 'rgba(25,35,65,0.88)');
  grad.addColorStop(1, 'rgba(20,30,55,0.85)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  const [sx0, sy0] = toScreen(pts[0][0], pts[0][1]);
  ctx.moveTo(sx0, sy0);
  for (let i = 1; i < pts.length; i++) {
    const [sx, sy] = toScreen(pts[i][0], pts[i][1]);
    ctx.lineTo(sx, sy);
  }
  ctx.closePath();
  ctx.fill();
}

function drawOutline(pts) {
  ctx.strokeStyle = 'rgba(90,130,255,0.5)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  const [sx0, sy0] = toScreen(pts[0][0], pts[0][1]);
  ctx.moveTo(sx0, sy0);
  for (let i = 1; i < pts.length; i++) {
    const [sx, sy] = toScreen(pts[i][0], pts[i][1]);
    ctx.lineTo(sx, sy);
  }
  ctx.closePath();
  ctx.stroke();

  // Glow pass
  ctx.strokeStyle = 'rgba(80,120,255,0.12)';
  ctx.lineWidth = 4;
  ctx.stroke();
}

function drawSkeleton() {
  // Draw bone segments
  ctx.lineWidth = 2;
  for (let i = 0; i < bones.length; i++) {
    const b = bones[i];
    if (b.parent < 0) continue;
    const p = bones[b.parent];
    const [sx1, sy1] = toScreen(p.wj[0], p.wj[1]);
    const [sx2, sy2] = toScreen(b.wj[0], b.wj[1]);

    ctx.strokeStyle = 'rgba(255,180,60,0.45)';
    ctx.beginPath();
    ctx.moveTo(sx1, sy1);
    ctx.lineTo(sx2, sy2);
    ctx.stroke();

    // Glow
    ctx.strokeStyle = 'rgba(255,160,40,0.1)';
    ctx.lineWidth = 6;
    ctx.stroke();
    ctx.lineWidth = 2;
  }
}

function drawJoints() {
  for (let i = 0; i < bones.length; i++) {
    const b = bones[i];
    const [sx, sy] = toScreen(b.wj[0], b.wj[1]);
    const r = i === 0 ? 5 : 3.5;

    // Joint circle
    ctx.fillStyle = i === 0
      ? 'rgba(255,100,80,0.7)'
      : 'rgba(255,200,80,0.6)';
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, PI * 2);
    ctx.fill();

    // Glow
    ctx.fillStyle = i === 0
      ? 'rgba(255,80,60,0.15)'
      : 'rgba(255,180,60,0.1)';
    ctx.beginPath();
    ctx.arc(sx, sy, r * 2.5, 0, PI * 2);
    ctx.fill();

    if (display.labels) {
      ctx.fillStyle = 'rgba(200,180,140,0.5)';
      ctx.font = '8px JetBrains Mono';
      ctx.fillText(b.name, sx + 8, sy - 4);
    }
  }
}

function drawCoM() {
  // Whole-body CoM
  const comDy = 3.7199;
  const [comSx, comSy] = toScreen(0, comDy);
  const dcom = deformPoint(0, comDy, getWeights(comDy));
  const [dcsx, dcsy] = toScreen(dcom[0], dcom[1]);

  ctx.strokeStyle = 'rgba(100,255,150,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dcsx - 6, dcsy); ctx.lineTo(dcsx + 6, dcsy);
  ctx.moveTo(dcsx, dcsy - 6); ctx.lineTo(dcsx, dcsy + 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(dcsx, dcsy, 4, 0, PI * 2);
  ctx.stroke();
}

// ===================================================================
// ANIMATION LOOP
// ===================================================================
let animTime = 0;
let lastTs = 0;
let speed = 1.0;
let playing = true;

function applyPreset(t) {
  const fn = PRESETS[activePreset];
  if (!fn) return;
  const angles = fn(t);
  for (const b of bones) {
    if (manualOverrides[b.name] !== undefined) {
      b.angle = manualOverrides[b.name];
    } else {
      b.angle = angles[b.name] || 0;
    }
  }
}

function render(ts) {
  if (!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;

  if (playing) animTime += dt * speed;

  // Apply animation
  applyPreset(animTime);

  // Forward kinematics
  updateBones();

  // Deform contour
  const deformed = deformContour();

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Grid
  if (display.grid) drawGrid();

  // Fill
  if (display.fill) drawFill(deformed);

  // Outline
  if (display.outline) drawOutline(deformed);

  // Skeleton
  if (display.skeleton) drawSkeleton();

  // Joints
  if (display.joints) drawJoints();

  // CoM
  if (display.com) drawCoM();

  // Stats
  updateStats();

  requestAnimationFrame(render);
}

function updateStats() {
  const el = document.getElementById('stats');
  const angleStrs = bones.map(b =>
    `<div class="stat"><span>${b.name}</span><span class="stat-v">${(b.angle * 180 / PI).toFixed(1)}°</span></div>`
  ).join('');
  el.innerHTML = `
    <div class="stat"><span>vertices</span><span class="stat-v">${contour.length}</span></div>
    <div class="stat"><span>bones</span><span class="stat-v">${bones.length}</span></div>
    <div class="stat"><span>preset</span><span class="stat-v">${activePreset}</span></div>
    <div class="stat"><span>time</span><span class="stat-v">${animTime.toFixed(1)}s</span></div>
    <div style="margin-top:6px;border-top:1px solid rgba(100,120,180,0.08);padding-top:6px">
    ${angleStrs}</div>
  `;
}

// ===================================================================
// UI CONTROLS
// ===================================================================
// Preset buttons
const presetsEl = document.getElementById('presets');
Object.keys(PRESETS).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'btn' + (name === activePreset ? ' active' : '');
  btn.textContent = name;
  btn.onclick = () => {
    activePreset = name;
    manualOverrides = {};
    presetsEl.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Reset sliders
    document.querySelectorAll('.bone-slider').forEach(sl => sl.value = 0);
  };
  presetsEl.appendChild(btn);
});

// Bone sliders
const slidersEl = document.getElementById('bone-sliders');
bones.forEach((b, i) => {
  const row = document.createElement('div');
  row.className = 'slider-row';
  const lbl = document.createElement('span');
  lbl.className = 'slider-label';
  lbl.textContent = b.name;
  const sl = document.createElement('input');
  sl.type = 'range';
  sl.className = 'bone-slider';
  sl.min = -30; sl.max = 30; sl.value = 0; sl.step = 0.5;
  sl.dataset.bone = b.name;
  const val = document.createElement('span');
  val.className = 'slider-val';
  val.textContent = '0°';
  sl.oninput = () => {
    const deg = parseFloat(sl.value);
    val.textContent = deg.toFixed(1) + '°';
    if (Math.abs(deg) < 0.3) {
      delete manualOverrides[b.name];
    } else {
      manualOverrides[b.name] = deg * PI / 180;
    }
  };
  row.appendChild(lbl);
  row.appendChild(sl);
  row.appendChild(val);
  slidersEl.appendChild(row);
});

// Display toggles
const togglesEl = document.getElementById('toggles');
Object.keys(display).forEach(key => {
  const row = document.createElement('div');
  row.className = 'toggle-row';
  const dot = document.createElement('div');
  dot.className = 'toggle-dot' + (display[key] ? ' on' : '');
  const lbl = document.createElement('span');
  lbl.className = 'toggle-label';
  lbl.textContent = key;
  row.onclick = () => {
    display[key] = !display[key];
    dot.classList.toggle('on');
  };
  row.appendChild(dot);
  row.appendChild(lbl);
  togglesEl.appendChild(row);
});

// Speed slider
const speedSlider = document.getElementById('speed');
const speedVal = document.getElementById('speed-val');
speedSlider.oninput = () => {
  speed = parseFloat(speedSlider.value) / 100;
  speedVal.textContent = speed.toFixed(1) + '×';
};

// ===================================================================
// FILE LOADING
// ===================================================================
function loadJsonData(json) {
  let newContourFlat, newLM;

  // v4 schema format: contour = [[dx,dy],...], landmarks = [{name,dx,dy},...]
  if (Array.isArray(json.contour) && Array.isArray(json.landmarks)) {
    newContourFlat = json.contour.flat();
    newLM = {};
    for (const lm of json.landmarks) {
      newLM[lm.name] = [lm.dx, lm.dy];
    }
  }
  // Compact format: c = flat array, l = dict
  else if (json.c && json.l) {
    newContourFlat = json.c;
    newLM = json.l;
  }
  else {
    throw new Error("Unrecognized format: needs 'contour'+'landmarks' or 'c'+'l'");
  }

  // Validate required landmarks for the bone system
  const required = ['crown','neck_valley','shoulder_peak','waist_valley',
                    'hip_peak','knee_valley','ankle_valley','sole'];
  for (const name of required) {
    if (!newLM[name]) throw new Error('Missing required landmark: ' + name);
  }

  // Update globals
  contour = parseContour(newContourFlat);
  LM = newLM;

  // Rebuild bone system
  BONE_DEFS = [
    { name: 'root',   jy: LM.waist_valley[1],   parent: -1 },
    { name: 'spine',  jy: LM.shoulder_peak[1],   parent: 0  },
    { name: 'neck',   jy: LM.neck_valley[1],     parent: 1  },
    { name: 'head',   jy: LM.crown[1],           parent: 2  },
    { name: 'pelvis', jy: LM.hip_peak[1],        parent: 0  },
    { name: 'thigh',  jy: LM.knee_valley[1],     parent: 4  },
    { name: 'shank',  jy: LM.ankle_valley[1],    parent: 5  },
    { name: 'foot',   jy: LM.sole[1],            parent: 6  },
  ];
  bones = BONE_DEFS.map(d => ({
    ...d, angle: 0,
    wm: [1,0,0, 0,1,0],
    wj: [0, d.jy],
  }));
  BI = {};
  bones.forEach((b,i) => BI[b.name] = i);
  vertexWeights = contour.map(p => getWeights(p[1]));

  // Reset animation state
  manualOverrides = {};
  animTime = 0;

  // Rebuild bone sliders
  slidersEl.innerHTML = '';
  bones.forEach((b) => {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const lbl = document.createElement('span');
    lbl.className = 'slider-label';
    lbl.textContent = b.name;
    const sl = document.createElement('input');
    sl.type = 'range'; sl.className = 'bone-slider';
    sl.min = -30; sl.max = 30; sl.value = 0; sl.step = 0.5;
    sl.dataset.bone = b.name;
    const val = document.createElement('span');
    val.className = 'slider-val';
    val.textContent = '0°';
    sl.oninput = () => {
      const deg = parseFloat(sl.value);
      val.textContent = deg.toFixed(1) + '°';
      if (Math.abs(deg) < 0.3) { delete manualOverrides[b.name]; }
      else { manualOverrides[b.name] = deg * PI / 180; }
    };
    row.appendChild(lbl); row.appendChild(sl); row.appendChild(val);
    slidersEl.appendChild(row);
  });
}

const fileInput = document.getElementById('file-input');
const loadBtn = document.getElementById('load-btn');
const loadStatus = document.getElementById('load-status');

loadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadStatus.style.color = '#404860';
  loadStatus.textContent = 'Loading…';
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const json = JSON.parse(ev.target.result);
      loadJsonData(json);
      loadStatus.style.color = 'rgba(100,255,150,0.6)';
      loadStatus.textContent = file.name + ' — ' + contour.length + ' pts';
    } catch (err) {
      loadStatus.style.color = '#ef4444';
      loadStatus.textContent = err.message;
    }
  };
  reader.onerror = () => {
    loadStatus.style.color = '#ef4444';
    loadStatus.textContent = 'Failed to read file.';
  };
  reader.readAsText(file);
  fileInput.value = '';
};

// Start
requestAnimationFrame(render);
</script>
